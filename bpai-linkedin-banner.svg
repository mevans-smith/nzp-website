<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" width="1128" height="191">
  <defs>
    <!-- Background gradient: near-black tones -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <!-- Gold gradient for bridge icon -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d27a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8892e;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle gold shimmer -->
    <linearGradient id="goldShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8c96a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1128" height="191" fill="url(#bgGrad)" />

  <!-- Very subtle top accent line -->
  <rect width="1128" height="1.5" fill="#c9a84c" opacity="0.5" />

  <!-- Large watermark "AI" on the right -->
  <text x="950" y="185" font-family="Arial, Helvetica, sans-serif" font-size="220" font-weight="900"
        fill="white" opacity="0.035" letter-spacing="-10" text-anchor="middle">AI</text>

  <!-- ===== BRIDGE ICON ===== -->
  <!-- Road/deck base line -->
  <line x1="28" y1="140" x2="148" y2="140" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>

  <!-- Left tower -->
  <rect x="52" y="72" width="8" height="70" fill="url(#goldGrad)" rx="1"/>
  <!-- Left tower crossbar top -->
  <rect x="44" y="78" width="24" height="4" fill="url(#goldGrad)" rx="1"/>
  <!-- Left tower crossbar mid -->
  <rect x="46" y="100" width="20" height="3" fill="#c9a84c" rx="1" opacity="0.8"/>

  <!-- Right tower -->
  <rect x="116" y="72" width="8" height="70" fill="url(#goldGrad)" rx="1"/>
  <!-- Right tower crossbar top -->
  <rect x="108" y="78" width="24" height="4" fill="url(#goldGrad)" rx="1"/>
  <!-- Right tower crossbar mid -->
  <rect x="110" y="100" width="20" height="3" fill="#c9a84c" rx="1" opacity="0.8"/>

  <!-- Main suspension cables (catenary curve approximation) -->
  <!-- Left main cable: from left tower top to right tower top, draping down -->
  <path d="M 56 79 Q 88 115 120 79" fill="none" stroke="url(#goldShimmer)" stroke-width="2" stroke-linecap="round"/>

  <!-- Vertical hanger cables (left side) -->
  <line x1="42" y1="140" x2="42" y2="140" stroke="#c9a84c" stroke-width="1.5" opacity="0.7"/>
  <line x1="56" y1="95" x2="56" y2="140" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <line x1="65" y1="102" x2="65" y2="140" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <line x1="74" y1="109" x2="74" y2="140" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <line x1="88" y1="115" x2="88" y2="140" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <line x1="102" y1="109" x2="102" y2="140" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <line x1="111" y1="102" x2="111" y2="140" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <line x1="120" y1="95" x2="120" y2="140" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>

  <!-- Anchor lines to ground on sides -->
  <line x1="56" y1="79" x2="30" y2="140" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
  <line x1="120" y1="79" x2="146" y2="140" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>

  <!-- Small gold accent dots at tower tops -->
  <circle cx="56" cy="72" r="3" fill="#f5d27a"/>
  <circle cx="120" cy="72" r="3" fill="#f5d27a"/>

  <!-- ===== TEXT AREA ===== -->
  <!-- "BridgePoint AI" wordmark -->
  <text x="180" y="100" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700"
        fill="white" letter-spacing="0.5">BridgePoint AI</text>

  <!-- Tagline below -->
  <text x="180" y="128" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400"
        fill="#c9a84c" letter-spacing="2.5">STRATEGY  ·  INVESTMENT  ·  EXECUTION</text>

  <!-- Gold accent underline -->
  <rect x="180" y="107" width="220" height="1.5" fill="url(#goldShimmer)" opacity="0.7" rx="1"/>

  <!-- Bottom right URL -->
  <text x="1108" y="179" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400"
        fill="#c9a84c" opacity="0.85" text-anchor="end" letter-spacing="0.5">www.bridgepointai.io</text>

  <!-- Subtle bottom gold line -->
  <rect y="188" width="1128" height="3" fill="url(#goldShimmer)" opacity="0.35" rx="1"/>
</svg>
