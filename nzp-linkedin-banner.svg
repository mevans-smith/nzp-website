<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" width="1128" height="191">
  <defs>
    <!-- Background gradient: deep navy to dark to electric blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0c4a6e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <!-- NZP logo dot-ring gradient: blue to green -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle noise texture overlay -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1128" height="191" fill="url(#bgGrad)" />

  <!-- Subtle top highlight line -->
  <rect width="1128" height="2" fill="#38bdf8" opacity="0.3" />

  <!-- Subtle grid texture overlay -->
  <rect width="1128" height="191" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.15"/>

  <!-- Large watermark text "10,000°C" on the right -->
  <text x="780" y="160" font-family="Arial, Helvetica, sans-serif" font-size="140" font-weight="900"
        fill="white" opacity="0.055" letter-spacing="-4" text-anchor="middle">10,000°C</text>

  <!-- ===== NZP LOGO — dot-ring cluster ===== -->
  <!-- Outer ring arc suggestion — large circle outline -->
  <circle cx="68" cy="95" r="52" fill="none" stroke="url(#logoGrad)" stroke-width="2" opacity="0.5"/>

  <!-- Center core dot -->
  <circle cx="68" cy="95" r="9" fill="url(#logoGrad)" />

  <!-- Inner ring of dots (6 dots, radius ~22) -->
  <circle cx="68" cy="73" r="5" fill="url(#logoGrad)" />
  <circle cx="87" cy="84" r="5" fill="url(#logoGrad)" />
  <circle cx="87" cy="106" r="5" fill="url(#logoGrad)" />
  <circle cx="68" cy="117" r="5" fill="url(#logoGrad)" />
  <circle cx="49" cy="106" r="5" fill="url(#logoGrad)" />
  <circle cx="49" cy="84" r="5" fill="url(#logoGrad)" />

  <!-- Outer ring of dots (12 dots, radius ~42) -->
  <circle cx="68" cy="53" r="3.5" fill="url(#logoGrad2)" opacity="0.85"/>
  <circle cx="89" cy="57" r="3" fill="url(#logoGrad2)" opacity="0.8"/>
  <circle cx="105" cy="71" r="3" fill="url(#logoGrad2)" opacity="0.75"/>
  <circle cx="110" cy="93" r="3.5" fill="url(#logoGrad2)" opacity="0.85"/>
  <circle cx="105" cy="115" r="3" fill="url(#logoGrad2)" opacity="0.8"/>
  <circle cx="89" cy="131" r="3" fill="url(#logoGrad2)" opacity="0.75"/>
  <circle cx="68" cy="137" r="3.5" fill="url(#logoGrad2)" opacity="0.85"/>
  <circle cx="47" cy="131" r="3" fill="url(#logoGrad2)" opacity="0.8"/>
  <circle cx="31" cy="115" r="3" fill="url(#logoGrad2)" opacity="0.75"/>
  <circle cx="26" cy="93" r="3.5" fill="url(#logoGrad2)" opacity="0.85"/>
  <circle cx="31" cy="71" r="3" fill="url(#logoGrad2)" opacity="0.8"/>
  <circle cx="47" cy="57" r="3" fill="url(#logoGrad2)" opacity="0.75"/>

  <!-- ===== TEXT AREA ===== -->
  <!-- "Net Zero Platforms" wordmark -->
  <text x="145" y="100" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700"
        fill="white" letter-spacing="0.5">Net Zero Platforms</text>

  <!-- Tagline below -->
  <text x="145" y="128" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400"
        fill="#94a3b8" letter-spacing="1.8" text-transform="uppercase">UHTMG TECHNOLOGY  ·  WASTE TO VALUE  ·  MODEL FIRST, INVEST LATER</text>

  <!-- Accent line under wordmark -->
  <rect x="145" y="107" width="280" height="1.5" fill="url(#logoGrad)" opacity="0.6" rx="1"/>

  <!-- Bottom right URL -->
  <text x="1108" y="179" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400"
        fill="white" opacity="0.7" text-anchor="end" letter-spacing="0.5">www.netzeroplatforms.com</text>

  <!-- Subtle bottom accent line -->
  <rect y="188" width="1128" height="3" fill="url(#logoGrad)" opacity="0.4" rx="1"/>
</svg>
